version: '3'

vars:
  MODULE: github.com/jimyag/sys-mcp
  BIN_DIR: bin

tasks:
  default:
    cmds:
      - task --list

  proto:
    desc: Generate protobuf and gRPC code
    cmds:
      - mkdir -p api/tunnel
      - |
        protoc \
          --go_out=. \
          --go_opt=Mapi/proto/tunnel.proto={{.MODULE}}/api/tunnel \
          --go-grpc_out=. \
          --go-grpc_opt=Mapi/proto/tunnel.proto={{.MODULE}}/api/tunnel \
          api/proto/tunnel.proto
    sources:
      - api/proto/tunnel.proto
    generates:
      - api/tunnel/*.go

  build:agent:
    desc: Build sys-mcp-agent
    cmds:
      - mkdir -p {{.BIN_DIR}}
      - go build -o {{.BIN_DIR}}/sys-mcp-agent ./cmd/sys-mcp-agent
    sources:
      - cmd/sys-mcp-agent/**/*.go
      - internal/sys-mcp-agent/**/*.go
      - internal/pkg/**/*.go
      - api/tunnel/**/*.go

  build:proxy:
    desc: Build sys-mcp-proxy
    cmds:
      - mkdir -p {{.BIN_DIR}}
      - go build -o {{.BIN_DIR}}/sys-mcp-proxy ./cmd/sys-mcp-proxy
    sources:
      - cmd/sys-mcp-proxy/**/*.go
      - internal/sys-mcp-proxy/**/*.go
      - internal/pkg/**/*.go
      - api/tunnel/**/*.go

  build:center:
    desc: Build sys-mcp-center
    cmds:
      - mkdir -p {{.BIN_DIR}}
      - go build -o {{.BIN_DIR}}/sys-mcp-center ./cmd/sys-mcp-center
    sources:
      - cmd/sys-mcp-center/**/*.go
      - internal/sys-mcp-center/**/*.go
      - internal/pkg/**/*.go
      - api/tunnel/**/*.go

  build:client:
    desc: Build sys-mcp-client
    cmds:
      - mkdir -p {{.BIN_DIR}}
      - go build -o {{.BIN_DIR}}/sys-mcp-client ./cmd/sys-mcp-client
    sources:
      - cmd/sys-mcp-client/**/*.go
      - internal/pkg/**/*.go

  build:
    desc: Build all binaries
    deps: [build:agent, build:proxy, build:center, build:client]

  test:
    desc: Run all tests with race detector
    cmds:
      - go test -race -timeout 60s ./...

  test:verbose:
    desc: Run all tests verbose with race detector
    cmds:
      - go test -race -v -timeout 60s ./...

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  lint:
    desc: Run golangci-lint (requires golangci-lint installed)
    cmds:
      - golangci-lint run ./...

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf {{.BIN_DIR}}

  tidy:
    desc: Tidy go modules
    cmds:
      - go mod tidy
