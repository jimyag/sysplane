version: "3"

output: "prefixed"

tasks:
  build:
    desc: "编译所有二进制到 bin/ (GOOS=linux GOARCH=amd64 task build)"
    deps: [go-mod-tidy]
    vars:
      GO_OS:
        sh: echo ${GOOS:-$(go env GOOS)}
      GO_ARCH:
        sh: echo ${GOARCH:-$(go env GOARCH)}
      OUT_DIR: "{{.GO_BIN}}/{{.GO_OS}}_{{.GO_ARCH}}"
    cmds:
      - rm -rf {{.OUT_DIR}}
      - mkdir -p {{.OUT_DIR}}
      - |
        CGO_ENABLED=0 GOOS={{.GO_OS}} GOARCH={{.GO_ARCH}} \
        GOMODCACHE={{.GO_PATH}}/pkg/mod \
        go build -trimpath -ldflags "{{.LDFLAGS}}" -o {{.OUT_DIR}}/ ./cmd/...
      - |
        if [ "{{.GO_OS}}" = "$(go env GOOS)" ] && [ "{{.GO_ARCH}}" = "$(go env GOARCH)" ]; then
          cp {{.OUT_DIR}}/sysplane-* {{.GO_BIN}}/
        fi

  go-mod-tidy:
    desc: go mod tidy
    internal: true
    run: once
    cmds:
      - go mod tidy
